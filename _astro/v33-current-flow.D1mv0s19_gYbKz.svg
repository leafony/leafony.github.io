<svg xmlns="http://www.w3.org/2000/svg" width="1486" height="650" viewBox="0 0 1486 650" role="img" aria-labelledby="title desc">
  <title id="title">3.3Vラインの電流測定時の電源系統図</title>
  <desc id="desc">AX05Bを中央に配置し、V33ラインは電流計を直列に入れて測定し、VBUSラインはジャンパーピンでショートさせる構成を示す図。</desc>
  <defs>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="14" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L16,8 L0,16 L5,8 Z" fill="#ff9100" />
    </marker>
  </defs>
  <rect width="1486" height="650" fill="#ffffff" />

  <rect x="290" y="112" width="685" height="86" fill="#dcefd6" />
  <rect x="290" y="248" width="685" height="240" fill="#dcefd6" />
  <rect x="290" y="550" width="685" height="86" fill="#dcefd6" />

  <text x="575" y="166" fill="#595959" font-family="sans-serif" font-size="36" font-weight="700">測定対象のリーフ</text>
  <text x="505" y="356" fill="#595959" font-family="sans-serif" font-size="40" font-weight="700">AX05B I Meas</text>
  <text x="485" y="405" fill="#595959" font-family="sans-serif" font-size="36" font-weight="700">（電流測定リーフ）</text>
  <text x="457" y="604" fill="#595959" font-family="sans-serif" font-size="36" font-weight="700">測定対象外のリーフ</text>

  <text x="307" y="60" fill="#ff9100" font-family="sans-serif" font-size="44" font-weight="700">V33</text>
  <text x="880" y="60" fill="#ff9100" font-family="sans-serif" font-size="44" font-weight="700">VBUS</text>

  <circle cx="101" cy="365" r="75" fill="#ffffff" stroke="#5f5f5f" stroke-width="5" />
  <text x="64" y="404" fill="#000000" font-family="sans-serif" font-size="110">A</text>
  <text x="53" y="506" fill="#595959" font-family="sans-serif" font-size="32" font-weight="700">電流計</text>

  <line x1="176" y1="331" x2="344" y2="331" stroke="#5f5f5f" stroke-width="17" />
  <line x1="176" y1="399" x2="344" y2="399" stroke="#5f5f5f" stroke-width="17" />
  <line x1="930" y1="331" x2="1098" y2="331" stroke="#5f5f5f" stroke-width="17" />
  <line x1="930" y1="399" x2="1098" y2="399" stroke="#5f5f5f" stroke-width="17" />
  <path d="M1098 331 C1152 337 1152 393 1098 399" fill="none" stroke="#ff0000" stroke-width="7" />

  <path d="M157 292 H352 V87" fill="none" stroke="#ff9100" stroke-width="6" marker-end="url(#arrow)" />
  <path d="M341 595 V438 H150" fill="none" stroke="#ff9100" stroke-width="6" marker-end="url(#arrow)" />
  <path d="M933 595 V438 H1134" fill="none" stroke="#ff9100" stroke-width="6" marker-end="url(#arrow)" />
  <path d="M1136 290 H932 V87" fill="none" stroke="#ff9100" stroke-width="6" marker-end="url(#arrow)" />

  <text x="1175" y="361" fill="#595959" font-family="sans-serif" font-size="34" font-weight="700">測定しないときは</text>
  <text x="1175" y="404" fill="#595959" font-family="sans-serif" font-size="34" font-weight="700">ショートさせる</text>
</svg>
